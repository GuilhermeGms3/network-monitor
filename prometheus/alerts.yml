groups:
  - name: network_alerts
    rules:
      - alert: DeviceCpuHigh
        expr: device_cpu_usage > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Device CPU high"
          description: "CPU usage above 85% for over 2 minutes"

      - alert: CollectorDown
        expr: up{job='snmp-collector'} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SNMP collector down"
          description: "Prometheus cannot scrape SNMP collector"
